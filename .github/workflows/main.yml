name: Extract and Update Comments

on:
  push:
    branches:
      - main
  schedule:
    - cron: "18 22 * * *"
  workflow_dispatch:

jobs:
  extract_comments:
    name: Extract Comments
    runs-on: ubuntu-24.04

    concurrency:
      group: "comments-${{ github.ref }}"
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run comments extractor
        run: |
          python extract_comments.py
          echo "Generated files in docs:"
          ls -la docs/*.json || echo "No JSON files found in docs"

      - name: Commit and Push Changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/
          git status
          git commit -m "Update comments files [skip ci]" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}